name: sarak
description: 사락 — 생명의 말씀이 사락 넘어갑니다
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.2
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  screenshot: ^2.3.0
  share_plus: ^12.0.1
  google_fonts: ^8.0.2

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1

  # ✅ 핵심 (최신 기준 유지)
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1 # 🌟 1. 아이콘 만드는 기계 추가!

flutter:
  uses-material-design: true
  assets:
    - assets/db/

# 🌟 2. 아이콘 기계 작동 설정 추가!
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"